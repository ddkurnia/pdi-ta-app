<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug - PDI TA App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
    h1 { text-align: center; color: #c4161c; margin-bottom: 24px; font-size: 22px; }
    .test { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .test h3 { font-size: 16px; margin-bottom: 12px; color: #333; }
    .status { padding: 14px 18px; border-radius: 8px; font-size: 14px; font-weight: bold; margin-top: 8px; }
    .pass { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .fail { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .wait { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
    .error-code { font-family: monospace; background: #f1f1f1; padding: 8px 12px; border-radius: 6px; margin-top: 8px; font-size: 13px; word-break: break-all; }
    .solusi { background: #e8f4fd; padding: 12px 16px; border-radius: 8px; margin-top: 10px; font-size: 13px; line-height: 1.6; border: 1px solid #b8daff; }
    .solusi b { color: #004085; }
    .btn { padding: 12px 28px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; background: #c4161c; color: #fff; display: block; margin: 20px auto; }
    .btn:hover { background: #a01020; }
    .form-row { margin-bottom: 10px; }
    .form-row label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    .form-row input { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; }
  </style>
</head>
<body>

<h1>PDI TA App - Debug</h1>
<p style="text-align:center;color:#888;margin-bottom:20px">Klik tombol di bawah untuk mengecek semua koneksi Firebase</p>

<button class="btn" id="startBtn" onclick="runAllTests()">JALANKAN TEST SEKARANG</button>

<div id="results" style="max-width:600px;margin:0 auto"></div>

<script>
const resultsDiv = document.getElementById('results');
const startBtn = document.getElementById('startBtn');

function addTest(title) {
  const div = document.createElement('div');
  div.className = 'test';
  div.innerHTML = `<h3>${title}</h3><div class="status wait">Menunggu test...</div>`;
  resultsDiv.appendChild(div);
  return div.querySelector('.status');
}

function setPass(el, msg) {
  el.className = 'status pass';
  el.innerHTML = '✅ BERHASIL — ' + msg;
}
function setFail(el, msg, errorCode, solusiHtml) {
  el.className = 'status fail';
  let html = '❌ GAGAL — ' + msg;
  if (errorCode) html += `<div class="error-code">Error: ${errorCode}</div>`;
  if (solusiHtml) html += solusiHtml;
  el.innerHTML = html;
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Gagal load script: ' + src));
    document.head.appendChild(s);
  });
}

async function runAllTests() {
  startBtn.style.display = 'none';
  resultsDiv.innerHTML = '';
  startBtn.textContent = 'Menjalankan...';

  // ===== TEST 1: Load Firebase SDK =====
  const t1 = addTest('1. Load Firebase SDK');
  try {
    await loadScript('https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js');
    setPass(t1, 'Firebase SDK berhasil dimuat');
  } catch(e) {
    setFail(t1, 'Firebase SDK gagal dimuat', e.message,
      `<div class="solusi"><b>Solusi:</b> Cek koneksi internet Anda. Pastikan tidak ada blokir terhadap gstatic.com</div>`);
    return;
  }

  // ===== TEST 2: Initialize Firebase =====
  const t2 = addTest('2. Koneksi Firebase Project');
  try {
    firebase.initializeApp({
      apiKey: "AIzaSyBUcw8o7otTVB97wR0mMJIo2LNkS_oSB5Y",
      authDomain: "pdi-ta-app.firebaseapp.com",
      projectId: "pdi-ta-app",
      storageBucket: "pdi-ta-app.appspot.com",
      messagingSenderId: "477558489412",
      appId: "1:477558489412:web:b0898e239f2145a5299711"
    });
    setPass(t2, 'Terhubung ke project <b>pdi-ta-app</b>');
  } catch(e) {
    setFail(t2, 'Gagal inisialisasi', e.message);
    return;
  }

  // ===== TEST 3: Auth =====
  const t3 = addTest('3. Authentication (Email/Password)');
  try {
    await firebase.auth().fetchSignInMethodsForEmail('test-does-not-exist-12345@example.com');
    setPass(t3, 'Email/Password auth aktif dan berfungsi');
  } catch(e) {
    if (e.code === 'auth/configuration-not-found') {
      setFail(t3, 'Email/Password auth belum diaktifkan', e.code,
        `<div class="solusi"><b>Solusi:</b><br>
        1. Buka Firebase Console → Authentication → Sign-in method<br>
        2. Klik <b>Email/Password</b><br>
        3. Aktifkan (Enable) → Save</div>`);
    } else {
      setPass(t3, 'Auth berfungsi (code: ' + e.code + ')');
    }
  }

  // ===== TEST 4: Firestore Read =====
  const t4 = addTest('4. Firestore - BACA data');
  try {
    const snap = await firebase.firestore().collection('users').limit(1).get();
    setPass(t4, 'Firestore bisa membaca collection "users" (' + snap.size + ' dokumen ditemukan)');
  } catch(e) {
    const msg = e.message || '';
    if (msg.includes('PERMISSION_DENIED') || msg.includes('permission-denied') || msg.includes('Missing or insufficient permissions')) {
      setFail(t4, 'Firestore Security Rules memblokir BACA', e.code || msg,
        `<div class="solusi"><b>PERBAIKAN WAJIB — Set Firestore Rules:</b><br><br>
        1. Buka <a href="https://console.firebase.google.com/project/pdi-ta-app/firestore/rules" target="_blank" style="color:#004085;font-weight:bold">Firebase Console → Firestore → Rules</a><br>
        2. Hapus semua rules yang lama<br>
        3. Paste rules ini:<br>
        <pre style="background:#fff;padding:10px;border-radius:6px;margin-top:8px;font-size:12px;border:1px solid #ddd">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}</pre>
        4. Klik <b>Publish</b><br><br>
        <b>Rules ini berarti:</b> Hanya user yang sudah login yang bisa baca/tulis data.
        Ini wajib diubah supaya registrasi bisa berfungsi.</div>`);
    } else {
      setFail(t4, 'Gagal membaca Firestore', e.code + ' — ' + msg);
    }
  }

  // ===== TEST 5: Firestore Write =====
  const t5 = addTest('5. Firestore - TULIS data');
  // For write test, we need to be signed in
  try {
    // Try anonymous auth first
    const anonUser = await firebase.auth().signInAnonymously();
    try {
      await firebase.firestore().collection('users').doc('__debug_test__').set({
        __test: true,
        __time: new Date().toISOString()
      });
      // Cleanup
      await firebase.firestore().collection('users').doc('__debug_test__').delete();
      setPass(t5, 'Firestore bisa MENULIS ke collection "users"');
    } catch(writeErr) {
      const msg = writeErr.message || '';
      if (msg.includes('PERMISSION_DENIED') || msg.includes('permission-denied') || msg.includes('Missing or insufficient permissions')) {
        setFail(t5, 'Firestore Security Rules memblokir TULIS', writeErr.code || msg,
          `<div class="solusi"><b>INILAH PENYEBAB GAGAL DAFTAR!</b><br><br>
          Firestore Security Rules saat ini tidak mengizinkan penulisan data.<br><br>
          <b>PERBAIKAN WAJIB:</b><br>
          1. Buka <a href="https://console.firebase.google.com/project/pdi-ta-app/firestore/rules" target="_blank" style="color:#004085;font-weight:bold">Firebase Console → Firestore → Rules</a><br>
          2. Hapus semua rules yang lama<br>
          3. Paste rules ini:<br>
          <pre style="background:#fff;padding:10px;border-radius:6px;margin-top:8px;font-size:12px;border:1px solid #ddd">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}</pre>
          4. Klik <b>Publish</b><br><br>
          <b>Penjelasan:</b> Saat ini rules Firestore menolak semua penulisan. Akun baru berhasil dibuat di Authentication, tapi data user gagal ditulis ke Firestore, sehingga registrasi dianggap gagal.</div>`);
      } else {
        setFail(t5, 'Gagal menulis ke Firestore', writeErr.code + ' — ' + msg);
      }
    }
    // Cleanup auth
    try { await anonUser.user.delete(); } catch(e) {}
  } catch(e) {
    setFail(t5, 'Tidak bisa login anonymous untuk test tulis', e.code + ' — ' + (e.message || ''),
      `<div class="solusi"><b>Solusi:</b> Buka Firebase Console → Authentication → Settings → Aktifkan <b>Anonymous</b> sign-in method, lalu coba lagi.</div>`);
  }

  // ===== SUMMARY =====
  const t6 = addTest('KESIMPULAN');
  const allStatus = resultsDiv.querySelectorAll('.status');
  const passCount = resultsDiv.querySelectorAll('.pass').length;
  const failCount = resultsDiv.querySelectorAll('.fail').length;

  if (failCount === 0) {
    setPass(t6, `Semua test BERHASIL (${passCount}/${passCount}). Firebase sudah benar. Coba daftar ulang di halaman utama.`);
  } else if (resultsDiv.querySelector('#results .fail')?.closest('.test')?.querySelector('h3')?.textContent.includes('TULIS')) {
    setFail(t6, `${passCount} BERHASIL, ${failCount} GAGAL. Kemungkinan besar masalahnya adalah <b>Firestore Security Rules</b>. Lihat solusi di atas.`,
      null, null);
  } else {
    setFail(t6, `${passCount} BERHASIL, ${failCount} GAGAL. Ada masalah dengan Firebase. Lihat detail di atas.`);
  }

  startBtn.style.display = 'block';
  startBtn.textContent = 'JALANKAN ULANG TEST';
  startBtn.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
