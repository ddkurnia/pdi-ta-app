<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Admin - PDI TA App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="admin-login-overlay">
  <div class="admin-login-card">
    <div class="login-logo" style="background:var(--purple)">P</div>
    <h1 style="font-size:18px;margin-bottom:4px">Admin Panel</h1>
    <p class="subtitle" style="margin-bottom:24px">PDI Perjuangan Kab. Kepulauan Meranti</p>
    <div class="form-group" style="text-align:left">
      <label>PIN Admin</label>
      <input type="password" id="adminKey" class="form-input" placeholder="Masukkan PIN..." style="text-align:center;letter-spacing:4px" onkeypress="if(event.key==='Enter')doAdminLogin()" autofocus>
    </div>
    <button class="btn btn-red btn-block btn-lg" onclick="doAdminLogin()">Masuk</button>
    <div id="loginErr" style="margin-top:12px;color:var(--red);font-size:13px;display:none"></div>
  </div>
</div>

<!-- ADMIN APP -->
<div class="app-shell" id="adminApp" style="display:none">

  <header class="app-header">
    <div class="header-left">
      <h2 id="pageTitle">Dashboard</h2>
    </div>
    <div class="header-right">
      <button class="bell-btn" onclick="openAdminNotifModal()">
        🔔
        <span class="notif-dot" id="bellDot"></span>
        <span class="notif-count" id="bellCount">0</span>
      </button>
      <button class="hamburger" onclick="doAdminLogout()">⏻</button>
    </div>
  </header>

  <div class="app-content">

    <!-- TAB: DASHBOARD -->
    <div id="page_a_home" class="tab-page">
      <div class="stat-grid cols-3">
        <div class="stat-card">
          <div class="stat-num" id="a_totalTA">0</div>
          <div class="stat-label">Total TA</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="a_pendUser" style="color:var(--orange)">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="a_totalRep">0</div>
          <div class="stat-label">Laporan</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="a_pendRep" style="color:var(--orange)">0</div>
          <div class="stat-label">Lap. Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="a_okRep" style="color:var(--green)">0</div>
          <div class="stat-label">Disetujui</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="a_monthRep" style="color:var(--blue)">0</div>
          <div class="stat-label">Bulan Ini</div>
        </div>
      </div>

      <div class="quick-actions no-print">
        <button class="btn btn-outline" onclick="openBroadcastModal()">📢 Broadcast</button>
        <button class="btn btn-outline" onclick="switchPage('a_laporan')">📋 Laporan</button>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Permintaan Pendaftaran</h3>
        </div>
        <div id="pendUsers">
          <div class="empty-state"><div class="empty-icon">⏳</div><h4>Memuat...</h4></div>
        </div>
      </div>
    </div>

    <!-- TAB: LAPORAN -->
    <div id="page_a_laporan" class="tab-page">
      <div class="filter-bar no-print">
        <select id="aPeriod" class="form-input" onchange="loadAdminReports()">
          <option value="all">Semua Periode</option>
          <option value="daily">Hari Ini</option>
          <option value="monthly">Bulan Ini</option>
          <option value="yearly">Tahun Ini</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadAdminReports()">Refresh</button>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Semua Laporan</h3>
        </div>
        <div id="adminRepList">
          <div class="empty-state"><div class="empty-icon">📋</div><h4>Memuat...</h4></div>
        </div>
      </div>
    </div>

    <!-- TAB: USER -->
    <div id="page_a_user" class="tab-page">
      <div class="filter-bar no-print">
        <input type="text" class="form-input" placeholder="Cari TA..." id="searchTA" oninput="searchTA(this.value)">
      </div>

      <div class="card">
        <div class="card-header">
          <h3>Daftar Tenaga Ahli</h3>
        </div>
        <div id="adminUserList">
          <div class="empty-state"><div class="empty-icon">👥</div><h4>Memuat...</h4></div>
        </div>
      </div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="a_home" onclick="switchPage('a_home')">
      <span class="nav-icon">🏠</span>
      <span>Beranda</span>
    </button>
    <button class="nav-item" data-page="a_laporan" onclick="switchPage('a_laporan')">
      <span class="nav-icon">📋</span>
      <span>Laporan</span>
    </button>
    <button class="nav-item" data-page="a_user" onclick="switchPage('a_user')">
      <span class="nav-icon">👥</span>
      <span>User</span>
    </button>
  </nav>
</div>

<!-- REPORT MODAL -->
<div class="modal-overlay" id="reportModal" onclick="if(event.target===this)closeModal('reportModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-top">
      <h3>Detail Laporan</h3>
      <button class="modal-close" onclick="closeModal('reportModal')">&times;</button>
    </div>
    <div class="modal-content" id="reportModalBody"></div>
  </div>
</div>

<!-- BROADCAST MODAL -->
<div class="modal-overlay" id="bcModal" onclick="if(event.target===this)closeModal('bcModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-top">
      <h3>📢 Broadcast Pesan</h3>
      <button class="modal-close" onclick="closeModal('bcModal')">&times;</button>
    </div>
    <div class="modal-content">
      <div class="form-group">
        <label>Judul *</label>
        <input id="bcTitle" class="form-input" placeholder="Judul pengumuman">
      </div>
      <div class="form-group">
        <label>Isi Pesan *</label>
        <textarea id="bcMsg" class="form-input" rows="4" placeholder="Tulis pesan..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('bcModal')">Batal</button>
      <button class="btn btn-red" onclick="sendBroadcast()">Kirim</button>
    </div>
  </div>
</div>

<!-- NOTIFICATION MODAL -->
<div class="modal-overlay" id="notifModal" onclick="if(event.target===this)closeModal('notifModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-top">
      <h3>Notifikasi</h3>
      <button class="modal-close" onclick="closeModal('notifModal')">&times;</button>
    </div>
    <div class="modal-content" id="notifModalBody" style="padding:0">
      <div class="empty-state"><div class="empty-icon">🔔</div><h4>Memuat...</h4></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="js/app.js"></script>
<script>
const ADMIN_PIN = 'pdimeranti2025';

async function doAdminLogin() {
  const key = document.getElementById('adminKey').value.trim();
  const errEl = document.getElementById('loginErr');
  if (!key) { errEl.textContent = 'Masukkan PIN admin'; errEl.style.display = 'block'; return; }
  if (key !== ADMIN_PIN) { errEl.textContent = 'PIN salah!'; errEl.style.display = 'block'; document.getElementById('adminKey').value = ''; return; }
  errEl.style.display = 'none';
  try {
    const result = await auth.signInAnonymously();
    currentUser = { uid: result.user.uid, nama: 'Admin', role: 'admin', status: 'active' };
    document.getElementById('adminLogin').style.display = 'none';
    document.getElementById('adminApp').style.display = 'flex';
    initNotifs(currentUser.uid);
    switchPage('a_home');
  } catch(e) {
    console.error('Firebase error:', e);
    if (e.code === 'auth/operation-not-allowed') {
      errEl.innerHTML = 'Aktifkan <b>Anonymous</b> Auth di Firebase Console';
    } else {
      errEl.textContent = 'Gagal: ' + (e.message || '');
    }
    errEl.style.display = 'block';
  }
}

function doAdminLogout() {
  if (confirm('Keluar dari panel admin?')) {
    currentUser = null;
    auth.signOut().catch(function(){});
    document.getElementById('adminApp').style.display = 'none';
    document.getElementById('adminLogin').style.display = 'flex';
    document.getElementById('adminKey').value = '';
  }
}

function openBroadcastModal() { document.getElementById('bcModal').classList.add('show'); }
function openAdminNotifModal() { loadNotifPage(); }

function searchTA(q) {
  q = q.toLowerCase();
  document.querySelectorAll('#adminUserList .pend-user').forEach(r => {
    r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('adminKey').focus();
});
</script>
</body>
</html>
