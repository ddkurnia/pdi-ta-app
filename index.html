<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#c4161c">
  <title>Login - PDI TA App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <div class="login-logo">PDI</div>
    <h1>Fraksi PDI Perjuangan</h1>
    <p class="subtitle">Kab. Kepulauan Meranti &mdash; Sistem Laporan TA</p>

    <div class="auth-toggle">
      <button class="active" onclick="switchAuthTab('login')">Masuk</button>
      <button onclick="switchAuthTab('register')">Daftar</button>
    </div>

    <!-- LOGIN -->
    <div id="formLogin">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="email@contoh.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="Masukkan password" onkeypress="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-red btn-block btn-lg" onclick="doLogin()">Masuk</button>
      <p style="margin-top:14px;font-size:12px;color:var(--text3);text-align:center">
        <a href="javascript:void(0)" onclick="doResetPw()" style="color:var(--text3)">Lupa Password?</a>
      </p>
    </div>

    <!-- REGISTER -->
    <div id="formRegister" style="display:none">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="regNama" class="form-input" placeholder="Nama Anda">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" class="form-input" placeholder="email@contoh.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPw" class="form-input" placeholder="Min. 6 karakter">
      </div>
      <div class="form-group">
        <label>Konfirmasi Password</label>
        <input type="password" id="regPwC" class="form-input" placeholder="Ulangi password" onkeypress="if(event.key==='Enter')doRegister()">
      </div>
      <button class="btn btn-red btn-block btn-lg" onclick="doRegister()">Daftar Akun</button>
      <p style="margin-top:14px;font-size:12px;color:var(--text3);text-align:center">
        Setelah daftar, tunggu approval admin
      </p>
    </div>

    <p style="margin-top:28px;font-size:11px;color:var(--text3)">&copy; 2025 Fraksi PDI Perjuangan</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="js/app.js"></script>
<script>
  auth.onAuthStateChanged(async u => {
    if (u) {
      try {
        const d = await db.collection('users').doc(u.uid).get();
        if (d.exists && d.data().status === 'active') {
          location.href = d.data().role === 'admin' ? 'admin.html' : 'ta.html';
        }
      } catch(e) {}
    }
  });
</script>
</body>
</html>
