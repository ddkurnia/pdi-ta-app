<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PDI TA App</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo-circle">PDI</div>
    <h2>Fraksi PDI Perjuangan</h2>
    <p class="sub">Kabupaten Kepulauan Meranti &mdash; Sistem Laporan Tenaga Ahli</p>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Masuk</button>
      <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Daftar</button>
    </div>

    <div id="formLogin">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" class="form-control" placeholder="Email Anda"></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPassword" class="form-control" placeholder="Password" onkeypress="if(event.key==='Enter')doLogin()"></div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">Masuk</button>
      <div style="text-align:center;margin-top:12px"><a href="javascript:void(0)" onclick="doResetPw()" style="font-size:11px;color:#999">Lupa Password?</a></div>
    </div>

    <div id="formRegister" style="display:none">
      <div class="form-group"><label>Nama Lengkap</label><input type="text" id="regNama" class="form-control" placeholder="Nama Anda"></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" class="form-control" placeholder="Email aktif"></div>
      <div class="form-group"><label>Password</label><input type="password" id="regPw" class="form-control" placeholder="Min 6 karakter"></div>
      <div class="form-group"><label>Konfirmasi Password</label><input type="password" id="regPwC" class="form-control" placeholder="Ulangi password" onkeypress="if(event.key==='Enter')doRegister()"></div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">Daftar Akun</button>
      <p style="text-align:center;font-size:11px;color:#999;margin-top:10px">Setelah daftar, tunggu approval admin.</p>
    </div>

    <div style="text-align:center;margin-top:18px;padding-top:14px;border-top:1px solid #eee">
      <p style="font-size:10px;color:#bbb">&copy; 2025 Fraksi PDI Perjuangan Kab. Kepulauan Meranti</p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="js/app.js"></script>
<script>
  auth.onAuthStateChanged(async u=>{
    if(u){try{const d=await db.collection('users').doc(u.uid).get();if(d.exists&&d.data().status==='active')location.href=d.data().role==='admin'?'admin.html':'ta.html';}catch(e){}}
  });
</script>
</body>
</html>
