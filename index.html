<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#c4161c">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Login - PDI TA App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
/* ============================================
   PDI TA App — Modern Glass Login v4
   ============================================ */
:root {
  --red: #c4161c;
  --red-dark: #8b0f13;
  --red-glow: rgba(196,22,28,.25);
  --red-soft: rgba(196,22,28,.08);
  --bg: #f0f2f5;
  --white: #ffffff;
  --glass: rgba(255,255,255,.72);
  --glass-border: rgba(255,255,255,.35);
  --text: #1a1a2e;
  --text2: #6b7280;
  --text3: #9ca3af;
  --border: rgba(0,0,0,.06);
  --shadow: 0 4px 24px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 48px rgba(0,0,0,.1);
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Plus Jakarta Sans', -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== LOGIN PAGE — always column ===== */
.login-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, #fef2f2 0%, var(--bg) 50%);
  position: relative;
}

/* --- Main area (hero + wave + card) — row on desktop --- */
.login-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* --- Hero Section --- */
.login-hero {
  width: 100%;
  position: relative;
  padding: 48px 24px 80px;
  text-align: center;
  background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 60%, #6b0a0e 100%);
  overflow: hidden;
}

.login-hero::before {
  content: '';
  position: absolute;
  top: -60%;
  left: -20%;
  width: 140%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,.12) 0%, transparent 60%);
  pointer-events: none;
}

.login-hero::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(255,255,255,.08) 0%, transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-circle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,.06);
  pointer-events: none;
}
.hero-circle:nth-child(1) { width: 120px; height: 120px; top: -30px; right: -20px; }
.hero-circle:nth-child(2) { width: 80px; height: 80px; bottom: 40px; left: -10px; }
.hero-circle:nth-child(3) { width: 50px; height: 50px; top: 30px; left: 15%; background: rgba(255,255,255,.04); }

.hero-logo {
  width: 88px;
  height: 88px;
  border-radius: 22px;
  background: var(--white);
  padding: 8px;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  position: relative;
  z-index: 2;
  animation: logoFloat 3s ease-in-out infinite;
}

.hero-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 14px;
}

@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

.login-hero h1 {
  font-size: 22px;
  font-weight: 800;
  color: #fff;
  margin-bottom: 6px;
  position: relative;
  z-index: 2;
  letter-spacing: -.3px;
}

.login-hero .subtitle {
  font-size: 13px;
  color: rgba(255,255,255,.75);
  font-weight: 500;
  position: relative;
  z-index: 2;
}

/* --- SVG Wave --- */
.login-wave {
  width: 100%;
  position: relative;
  margin-top: -1px;
  line-height: 0;
}

.login-wave svg {
  display: block;
  width: 100%;
  height: auto;
}

/* --- Glass Card --- */
.login-card-wrap {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px 20px;
  margin-top: -44px;
  position: relative;
  z-index: 5;
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg), inset 0 1px 0 var(--glass-border);
  padding: 28px 24px 24px;
  animation: cardUp .5s cubic-bezier(.16,1,.3,1);
  position: relative;
  overflow: hidden;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.6), transparent);
}

@keyframes cardUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* --- Auth Toggle --- */
.auth-toggle {
  display: flex;
  background: rgba(0,0,0,.04);
  border-radius: var(--radius-xs);
  padding: 3px;
  margin-bottom: 24px;
  position: relative;
}

.auth-toggle button {
  flex: 1;
  padding: 11px;
  border: none;
  background: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all .25s;
  position: relative;
  z-index: 2;
}

.auth-toggle button.active {
  color: var(--red);
  background: var(--white);
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* --- Form --- */
.form-group { margin-bottom: 18px; }

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 7px;
  text-transform: uppercase;
  letter-spacing: .5px;
}

.form-input {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-xs);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  background: rgba(255,255,255,.6);
  transition: all .25s;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}

.form-input:focus {
  border-color: var(--red);
  background: var(--white);
  box-shadow: 0 0 0 4px var(--red-soft);
}

.form-input::placeholder { color: var(--text3); font-weight: 400; }

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 13px 24px;
  border: none;
  border-radius: var(--radius-xs);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  line-height: 1.4;
  letter-spacing: .2px;
}

.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

.btn-red {
  background: linear-gradient(135deg, var(--red), var(--red-dark));
  color: #fff;
  box-shadow: 0 4px 16px var(--red-glow);
}

.btn-red:hover {
  box-shadow: 0 6px 24px rgba(196,22,28,.35);
  transform: translateY(-1px);
}

.btn-red:active { transform: translateY(0) scale(.97); }
.btn-block { width: 100%; }
.btn-lg { padding: 15px 28px; font-size: 15px; }

/* --- Loading --- */
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
.spinner-center { display: flex; align-items: center; justify-content: center; padding: 40px; }
.loading-overlay { position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(255,255,255,.75); display: none; align-items: center; justify-content: center; z-index: 9000; }
.loading-overlay.show { display: flex; }

/* --- Toast --- */
.toast-area { position: fixed; top: 16px; left: 16px; right: 16px; z-index: 8000; display: flex; flex-direction: column; pointer-events: none; }
.toast-area > .toast-msg { margin-bottom: 8px; }
.toast-msg { display: flex; align-items: center; padding: 12px 16px; background: var(--text); color: #fff; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); animation: slideUp .3s ease; pointer-events: auto; }
.toast-msg > span:first-child { margin-right: 10px; }
.toast-msg.toast-success { background: #16a34a; }
.toast-msg.toast-error { background: var(--red); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

/* --- Footer (always at bottom) --- */
.login-footer {
  text-align: center;
  padding: 8px 20px 24px;
  font-size: 11px;
  color: var(--text3);
}

/* --- Misc --- */
.form-link { text-align: center; margin-top: 16px; font-size: 12px; color: var(--text3); }
.form-link a { color: var(--red); text-decoration: none; font-weight: 600; }
.form-link a:hover { text-decoration: underline; }
.form-hint { text-align: center; margin-top: 14px; font-size: 11px; color: var(--text3); }

/* ===== Desktop: sidebar hero + card ===== */
@media (min-width: 769px) {
  .login-main {
    flex-direction: row;
    align-items: stretch;
  }
  .login-hero {
    flex: 0 0 42%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 32px;
    min-height: 100vh;
    clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
  }
  .login-wave { display: none; }
  .login-card-wrap {
    flex: 1;
    align-items: center;
    margin-top: 0;
    padding: 40px 32px;
  }
  .login-card { max-width: 420px; padding: 36px 32px 28px; }
  .login-footer { padding: 12px 32px 24px; }
}
  </style>
</head>
<body>

<div class="login-page">

  <div class="login-main">

    <!-- HERO -->
    <div class="login-hero">
      <div class="hero-circle"></div>
      <div class="hero-circle"></div>
      <div class="hero-circle"></div>
      <div class="hero-logo">
        <img src="https://raw.githubusercontent.com/ddkurnia/pdi-ta-app/main/logo-pdip.png"
             alt="Logo PDI Perjuangan"
             onerror="this.style.display='none';this.parentElement.innerHTML='<span style=&quot;font-size:28px;font-weight:900;color:#c4161c&quot;>PDI</span>'">
      </div>
      <h1>PDI Perjuangan</h1>
      <p class="subtitle">Fraksi DPRD Kab. Kepulauan Meranti</p>
    </div>

    <!-- WAVE -->
    <div class="login-wave">
      <svg viewBox="0 0 1440 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path fill="#f0f2f5" d="M0,64 C180,100 360,0 540,48 C720,96 900,16 1080,56 C1260,96 1350,40 1440,64 L1440,100 L0,100 Z"/>
      </svg>
    </div>

    <!-- GLASS CARD -->
    <div class="login-card-wrap">
      <div class="login-card">

        <div class="auth-toggle">
          <button class="active" onclick="switchAuthTab('login')">Masuk</button>
          <button onclick="switchAuthTab('register')">Daftar</button>
        </div>

        <!-- LOGIN -->
        <div id="formLogin">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="email@contoh.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Masukkan password" onkeypress="if(event.key==='Enter')doLogin()" autocomplete="current-password">
          </div>
          <button class="btn btn-red btn-block btn-lg" onclick="doLogin()">Masuk</button>
          <div class="form-link">
            <a href="javascript:void(0)" onclick="doResetPw()">Lupa Password?</a>
          </div>
        </div>

        <!-- REGISTER -->
        <div id="formRegister" style="display:none">
          <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="regNama" class="form-input" placeholder="Nama Anda" autocomplete="name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" class="form-input" placeholder="email@contoh.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPw" class="form-input" placeholder="Min. 6 karakter" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label>Konfirmasi Password</label>
            <input type="password" id="regPwC" class="form-input" placeholder="Ulangi password" onkeypress="if(event.key==='Enter')doRegister()" autocomplete="new-password">
          </div>
          <button class="btn btn-red btn-block btn-lg" onclick="doRegister()">Daftar Akun</button>
          <div class="form-hint">Setelah daftar, tunggu approval admin</div>
        </div>

      </div>
    </div>

  </div><!-- /.login-main -->

  <div class="login-footer">
    &copy; 2026 Fraksi PDI Perjuangan &mdash; Kab. Kepulauan Meranti
  </div>

</div><!-- /.login-page -->

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="js/app.js?v=16"></script>
<script>
  auth.onAuthStateChanged(async u => {
    if (u) {
      try {
        const d = await db.collection('users').doc(u.uid).get();
        if (d.exists && d.data().status === 'active') {
          location.href = d.data().role === 'admin' ? 'admin.html' : 'ta.html';
        }
      } catch(e) {}
    }
  });
</script>
</body>
</html>
